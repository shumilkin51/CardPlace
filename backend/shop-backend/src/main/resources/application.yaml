server:
  port: 8080

spring:
  application:
    name: shop-backend
  datasource:
    url: jdbc:postgresql://localhost:5431/shopdb
    username: shopuser
    password: shoppass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: SHOP
    create-schemas: true

logging:
  level:
    root: INFO
    com.example: DEBUG